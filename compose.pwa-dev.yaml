---
# Next.js hot reload in Docker: dev image + bind mount. Merged by root Makefile (COMPOSE_DEV).
# CI and plain `docker compose -f compose.yaml -f compose.override.yaml` keep production-style PWA.
services:
  pwa:
    build:
      context: ./pwa
      dockerfile: Dockerfile
      target: dev
      args:
        NEXT_PUBLIC_SYMFONY_API_BASE_URL: ${NEXT_PUBLIC_SYMFONY_API_BASE_URL:-https://localhost}
    volumes:
      - ./pwa:/srv/app
      - pwa_node_modules:/srv/app/node_modules
    environment:
      NODE_ENV: development

volumes:
  pwa_node_modules:
