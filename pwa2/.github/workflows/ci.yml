name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: make pwa.install

      - name: Lint
        run: make pwa.lint

      - name: Unit Tests
        run: make pwa.test

      - name: Build
        run: make pwa.build

      - name: E2E Tests
        run: |
          npx playwright install chromium --with-deps
          make pwa.e2e
