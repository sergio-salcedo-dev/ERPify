---
# GitHub Actions only: longer healthcheck grace while php entrypoint runs cold
# composer install + DB wait + migrations before FrankenPHP listens on :2019.
# Merge: docker compose -f compose.yaml -f compose.override.yaml -f compose.ci.yaml …
services:
  php:
    healthcheck:
      start_period: 360s

  pwa:
    healthcheck:
      start_period: 180s
