---
# Dev Container overrides (monorepo): firewall caps, Xdebug, full repo at /workspace.
# Symfony stays at /app via root compose.override.yaml (./api:/app).
services:
  php:
    cap_add:
      - NET_ADMIN
    environment:
      XDEBUG_MODE: "${XDEBUG_MODE:-develop,debug}"
      XDEBUG_CONFIG: "client_host=127.0.0.1 start_with_request=yes"
    volumes:
      - ../:/workspace:cached
