---
# Development overrides (monorepo root). Build context: ./api
services:
  php:
    image: ${IMAGES_PREFIX:-}app-php-dev
    build:
      context: ./api
      target: frankenphp_dev
    volumes:
      - ./api:/app
      - ./api/frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./api/frankenphp/worker.Caddyfile:/etc/frankenphp/worker.Caddyfile:ro
      - ./api/frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
    environment:
      FRANKENPHP_WORKER_CONFIG: watch
      FRANKENPHP_SITE_CONFIG: hot_reload
      MERCURE_EXTRA_DIRECTIVES: demo
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      PHP_IDE_CONFIG: "serverName=${PHP_IDE_SERVER_NAME:-dev}"
      APP_ENV: "${APP_ENV:-dev}"
    extra_hosts:
      - host.docker.internal:host-gateway
    tty: true

  database:
    ports:
      - "5432"
