---
# Development overrides (monorepo root). Build context: ./api
services:
  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  php:
    image: ${IMAGES_PREFIX:-}app-php-dev
    build:
      context: ./api
      target: frankenphp_dev
    depends_on:
      mailpit:
        condition: service_started
    volumes:
      - ./api:/app
      - ./api/var:/app/var
      - ./api/frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./api/frankenphp/worker.Caddyfile:/etc/frankenphp/worker.Caddyfile:ro
      - ./api/frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
    environment:
      FRANKENPHP_WORKER_CONFIG: watch
      FRANKENPHP_SITE_CONFIG: hot_reload
      MERCURE_EXTRA_DIRECTIVES: demo
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
      PHP_IDE_CONFIG: "serverName=${PHP_IDE_SERVER_NAME:-dev}"
      APP_ENV: "${APP_ENV:-dev}"
      MAILER_DSN: "${MAILER_DSN:-smtp://mailpit:1025}"
    extra_hosts:
      - host.docker.internal:host-gateway
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:2019/metrics"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 180s

  pwa:
    # Stable tag for bake + `compose up --no-build` (avoids default erpify-pwa:latest mismatch).
    image: ${IMAGES_PREFIX:-}app-pwa-dev
    build:
      context: ./pwa
      dockerfile: Dockerfile
      target: dev
      args:
        NEXT_PUBLIC_SYMFONY_API_BASE_URL: ${NEXT_PUBLIC_SYMFONY_API_BASE_URL:-https://localhost}
    volumes:
      - ./pwa:/srv/app
      - pwa_node_modules:/srv/app/node_modules
    environment:
      NODE_ENV: development
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s

  database:
    ports:
      - "5432"

  # Dev image + bind mount for messenger_worker (service definition continues in compose.yaml).
  messenger_worker:
    image: ${IMAGES_PREFIX:-}app-php-dev
    build:
      context: ./api
      target: frankenphp_dev
    depends_on:
      mailpit:
        condition: service_started
    environment:
      MAILER_DSN: "${MAILER_DSN:-smtp://mailpit:1025}"
    volumes:
      - ./api:/app
      - ./api/var:/app/var
      - ./api/frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro

volumes:
  pwa_node_modules:
