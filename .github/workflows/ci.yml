name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:

  # -------------------------
  # API BUILD (single source of truth)
  # -------------------------
  api-build:
    name: API Build (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/docker-setup

      - name: Build images
        uses: docker/bake-action@v7
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.dev.yaml
          set: |
            php.cache-from=type=gha,scope=php-${{ github.ref_name }}
            php.cache-from=type=gha,scope=php-main
            php.cache-to=type=gha,scope=php-${{ github.ref_name }},mode=max

            pwa.cache-from=type=gha,scope=pwa-${{ github.ref_name }}
            pwa.cache-from=type=gha,scope=pwa-main
            pwa.cache-to=type=gha,scope=pwa-${{ github.ref_name }},mode=max

  # -------------------------
  # API TEST (fast feedback)
  # -------------------------
  api-test:
    name: API Tests (PHPUnit + Lint)
    needs: api-build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/docker-setup

      - name: Build images
        uses: docker/bake-action@v7
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.dev.yaml
          set: |
            php.cache-from=type=gha,scope=php-${{ github.ref_name }}
            php.cache-from=type=gha,scope=php-main
            pwa.cache-from=type=gha,scope=pwa-${{ github.ref_name }}
            pwa.cache-from=type=gha,scope=pwa-main

      - name: Start API stack
        run: docker compose -f compose.yaml -f compose.dev.yaml up --wait --no-build

      - name: Health check
        run: curl -skSf https://localhost/api/v1/health

      - name: PHP lint
        run: docker compose exec -T php make php.lint

      - name: PHPUnit
        run: docker compose exec -T -e APP_ENV=test php bin/phpunit

      - name: Debug
        if: failure()
        run: |
          docker compose ps
          docker compose logs

      - name: Security check
        uses: symfonycorp/security-checker-action@v5
        with:
          lock: ./api/composer.lock

  # -------------------------
  # API BEHAT (parallel)
  # -------------------------
  api-behat:
    name: API Behat
    needs: api-build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/docker-setup

      - name: Build images
        uses: docker/bake-action@v7
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.dev.yaml
          set: |
            php.cache-from=type=gha,scope=php-${{ github.ref_name }}
            php.cache-from=type=gha,scope=php-main
            pwa.cache-from=type=gha,scope=pwa-${{ github.ref_name }}
            pwa.cache-from=type=gha,scope=pwa-main

      - name: Start API stack
        run: docker compose -f compose.yaml -f compose.dev.yaml up --wait --no-build

      - name: Health check
        run: curl -skSf https://localhost/api/v1/health

      - name: Install Behat tools
        run: docker compose exec -T php composer behat-tools-install --no-interaction

      - name: Run Behat
        run: docker compose exec -T \
          -e APP_ENV=test \
          -e MINK_BASE_URL=http://php \
          php bin/behat --format=pretty

      - name: Debug
        if: failure()
        run: |
          docker compose ps
          docker compose logs

  # -------------------------
  # PWA NODE (isolated, fast)
  # -------------------------
  pwa-node:
    name: PWA (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/node-setup

      - run: make pwa.install
      - run: make pwa.lint
      - run: make pwa.test.unit
      - run: make pwa.build

  # -------------------------
  # PWA E2E (depends on build)
  # -------------------------
  pwa-e2e:
    name: PWA (E2E)
    needs: [pwa-node, api-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/full-setup/

      - name: Build images
        uses: docker/bake-action@v7
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.dev.yaml
          set: |
            php.cache-from=type=gha,scope=php-${{ github.ref_name }}
            php.cache-from=type=gha,scope=php-main
            pwa.cache-from=type=gha,scope=pwa-${{ github.ref_name }}
            pwa.cache-from=type=gha,scope=pwa-main

      - name: Install PWA dependencies (host)
        run: make pwa.install

      - name: Start full stack
        env:
          COMPOSE_PROJECT_NAME: erpify-e2e
        run: docker compose -f compose.yaml -f compose.dev.yaml up --wait --no-build

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./pwa/package-lock.json').packages['pwa/node_modules/@playwright/test'].version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd pwa && npx playwright install --with-deps chromium

      - name: Run E2E
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: https://localhost
        run: make pwa.e2e

      - name: Debug
        if: failure()
        env:
          COMPOSE_PROJECT_NAME: erpify-e2e
        run: |
          docker compose ps
          docker compose logs

  # -------------------------
  # FINAL STATUS (strict gate)
  # -------------------------
  ci-success:
    name: CI Status
    needs: [api-test, api-behat, pwa-node, pwa-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Success
        run: echo "All checks passed successfully!"
