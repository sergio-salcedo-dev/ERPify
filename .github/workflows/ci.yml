name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:

  # -------------------------
  # API BUILD
  # -------------------------
  api-build:
    name: API Build (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: ./.github/actions/docker-setup

      - name: Build Docker images
        uses: docker/bake-action@v7
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.dev.yaml
          set: |
            php.cache-from=type=gha,scope=php-${{ github.ref_name }}
            php.cache-from=type=gha,scope=php-main
            php.cache-to=type=gha,scope=php-${{ github.ref_name }},mode=max

            pwa.cache-from=type=gha,scope=pwa-${{ github.ref_name }}
            pwa.cache-from=type=gha,scope=pwa-main
            pwa.cache-to=type=gha,scope=pwa-${{ github.ref_name }},mode=max

  # -------------------------
  # API TEST
  # -------------------------
  api-test:
    name: API Tests
    needs: api-build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: ./.github/actions/docker-setup

      - name: Start API stack
        run: docker compose -f compose.yaml -f compose.dev.yaml up --wait --no-build

      - name: Health check
        run: curl -skSf https://localhost/api/v1/health

      - name: PHP Lint
        run: docker compose exec -T php make php.lint

      - name: PHPUnit
        run: docker compose exec -T -e APP_ENV=test php bin/phpunit

      - name: Debug
        if: failure()
        run: |
          docker compose ps
          docker compose logs

      - name: Security checker
        uses: symfonycorp/security-checker-action@v5
        with:
          lock: ./api/composer.lock

  # -------------------------
  # API BEHAT
  # -------------------------
  api-behat:
    name: API Behat
    needs: api-build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: ./.github/actions/docker-setup

      - name: Start API stack
        run: docker compose -f compose.yaml -f compose.dev.yaml up --wait --no-build

      - name: Health check
        run: curl -skSf https://localhost/api/v1/health

      - name: Install Behat tools
        run: docker compose exec -T php composer behat-tools-install --no-interaction

      - name: Run Behat
        run: docker compose exec -T \
          -e APP_ENV=test \
          -e MINK_BASE_URL=http://php \
          php bin/behat --format=pretty

      - name: Debug
        if: failure()
        run: |
          docker compose ps
          docker compose logs

  # -------------------------
  # PWA NODE
  # -------------------------
  pwa-node:
    name: PWA (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: ./.github/actions/node-setup

      - name: Install dependencies
        run: make pwa.install

      - name: Lint
        run: make pwa.lint

      - name: Unit tests
        run: make pwa.tests

      - name: Build
        run: make pwa.build

  # -------------------------
  # PWA E2E
  # -------------------------
  pwa-e2e:
    name: PWA (E2E)
    needs: [pwa-node, api-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: ./.github/actions/full-setup

      - name: Start full stack
        env:
          COMPOSE_PROJECT_NAME: erpify-e2e
        run: docker compose -f compose.yaml -f compose.dev.yaml up --wait --no-build

      - name: Wait for API
        run: |
          for i in {1..60}; do
            if curl -skSf https://localhost/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Cache Playwright
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pwa/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright
        run: cd pwa && npx playwright install --with-deps chromium

      - name: Run E2E
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: https://localhost
        run: make pwa.e2e

      - name: Debug
        if: failure()
        env:
          COMPOSE_PROJECT_NAME: erpify-e2e
        run: |
          docker compose ps
          docker compose logs

  # -------------------------
  # LINT (lightweight)
  # -------------------------
  lint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run yamllint
        run: |
          pip install yamllint
          yamllint .

  # -------------------------
  # FINAL STATUS
  # -------------------------
  ci-success:
    name: CI Status
    needs: [api-test, api-behat, pwa-node, pwa-e2e, lint]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Validate results
        run: |
          results=(
            "${{ needs.api-test.result }}"
            "${{ needs.api-behat.result }}"
            "${{ needs.pwa-node.result }}"
            "${{ needs.pwa-e2e.result }}"
            "${{ needs.lint.result }}"
          )

          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "CI failed (job result: $r)"
              exit 1
            fi
          done

          echo "All jobs passed"
