name: Node setup
description: Checkout + Node.js with npm cache
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - uses: actions/setup-node@v6
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: pwa/package-lock.json
