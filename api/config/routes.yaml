# API v1 — attribute routes from every bounded context under src/ (e.g. Backoffice/*/Infrastructure/Controller/).
# Classes with #[Route] receive controller.service_arguments via FrameworkBundle autoconfiguration.
api_v1_back_office:
    resource: ../src/Backoffice/
    type: attribute
    prefix: /api/v1/backoffice
    defaults:
        _format: json

api_v1_front_office:
    resource: ../src/Frontoffice/
    type: attribute
    prefix: /api/v1
    defaults:
        _format: json
