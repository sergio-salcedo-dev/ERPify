services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true

    Erpify\Tests\DataFixtures\:
        resource: '../tests/DataFixtures/*'

    Erpify\Tests\Behat\:
        resource: '../tests/Behat/*'
        exclude:
            - '../tests/Behat/Assertion/Json/*'
            - '../tests/Behat/Transport/HttpResponse.php'
            - '../tests/Behat/Support/PostProcess/*'
            - '../tests/Behat/Support/Tool/*'
            - '../tests/Behat/Context/Abstraction/*'
            - '../tests/Behat/Assertion/NodeModifier/NodeModifierInterface.php'
            - '../tests/Behat/Assertion/NodeModifier/AbstractNodeModifier.php'

    Erpify\Tests\Behat\Transport\HttpResponseContainer: ~

    Erpify\Tests\Behat\Context\HttpRequestContext:
        $baseUrl: '/api/v1'
        $serverPort: 80
