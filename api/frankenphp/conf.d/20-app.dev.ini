; See https://docs.docker.com/desktop/features/networking/networking-how-tos/#connect-a-container-to-a-service-on-the-host
; See https://github.com/docker/for-linux/issues/264
; `host.docker.internal` is mapped via compose.dev.yaml extra_hosts on Linux (Docker 20.10+).
; Xdebug 3 — IDE listens on host port 9003 (path maps: container /app -> host ./api in this monorepo)
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.discover_client_host = 0
xdebug.start_with_request = trigger
